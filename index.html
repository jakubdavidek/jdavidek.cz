    /* ---------- Fallback icon (simple square) for the brief moment Lucide loads ---------- */
    const Stub = ({ className = "", ...p }) =>

    /* Handy hook so we grab lucide icons only after the ESM import resolves */
    function useLucide() {
      const [ready, setReady] = useState(!!window.__lucideReady);
      useEffect(() => {
        if (ready) return;
        const h = () => setReady(true);
        window.addEventListener('lucide-ready', h);
        return () => window.removeEventListener('lucide-ready', h);
      }, [ready]);
      const L = window.Lucide || {};
      const get = (name) => L[name] || Stub;
      return { ready, get };
    }

    /* ---------- Reveal on scroll ---------- */
    function Reveal({ children, delay = 0, className = "" }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              setTimeout(() => el.classList.add('visible'), delay);
              io.unobserve(el);
            }
          });
        }, { threshold: 0.12 });
        io.observe(el);
        return () => io.disconnect();
      }, [delay]);
      return <div ref={ref} className={`reveal ${className}`}>{children}</div>;
    }

    /* ---------- Cookie Banner ---------- */
    function CookieBanner({ onClose }) {
      const { get } = useLucide();
      const Cookie = get('Cookie');
      const X = get('X');
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const t = setTimeout(() => setVisible(true), 600);
        return () => clearTimeout(t);
      }, []);
      const dismiss = (choice) => {
        setVisible(false);
        setTimeout(() => onClose(choice), 250);
      };
      return (
        <div aria-live="polite"
          className={`fixed bottom-4 inset-x-4 md:inset-x-auto md:right-6 md:bottom-6 md:max-w-md z-[60] transition-all duration-300 ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'
            }`}>
          <div className="relative bg-white border border-slate-200 rounded-2xl shadow-2xl shadow-slate-900/10 p-5 sm:p-6">
            <button onClick={() => dismiss('decline')} aria-label="Zavřít"
              className="absolute top-3 right-3 w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-700 transition-colors">
              <X className="w-4 h-4" />

              </div>
            </div>

                Přijmout
              </button>
              <button onClick={() => dismiss('decline')}
                className="btn-secondary flex-1 bg-white border-2 border-slate-200 hover:border-[#3a1f08] text-[#3a1f08] text-sm font-semibold px-4 py-2.5 rounded-full transition-all">

            </div>
          </div>
        </div>
      );

        <div className="min-h-screen bg-white">
